<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>to-do-list</title>
        <link rel="stylesheet" href="./dist/css/bundle.min.css">
    </head>

    <body>
        <section id="list-section">
            <h1>CHECK LIST</h1>

            <div class="list-contents">
                <h2 class="hidden">리스트 영역</h2>
                <div id="todo-list" class="list-wrap"></div>
            </div>

            <div class="list-btns js-list-btns"> 
                <div class="list-default">
                    <button id="add-btn"> 
                        <img src="public/img/icon_plus_pink.png" alt="추가 아이콘" />
                    </button>
                    
                    <button id="delete-btn">
                        <img class="delete-icon" src="public/img/icon_close_pink.png" alt="삭제 아이콘" />
                    </button>              
                </div>
    
                <div class="list-delete-mode">
                    <button id="close-btn">
                        <img class="close-icon" src="public/img/icon_close_pink.png" alt="닫기 아이콘" />
                    </button>
    
                    <button id="delete-save-btn">
                        <img class="check-icon" src="public/img/icon_check_pink.png" alt="체크 아이콘" />
                    </button>
                </div>
            </div>

            <div id="light-box" class="light-box-wrap">
                <div class="light-box-contents">
                    <h2 class="hidden">팝업</h2>
                    <button class="light-box-close-btn js-close">
                        <span class="hidden">닫기</span>
                        <img src="public/img/icon_cancel.png" alt="닫기 아이콘" />
                    </button>
    
                    <div>
                        <div class="light-box-text">
                            <input 
                                id="light-box-input"
                                type="text" 
                                value="" 
                                placeholder="내용을 입력해주세요."
                            />
                        </div>
        
                        <div class="light-box-btns">
                            <!-- [D] add = 저장 / edit = 수정 -->
                            <button class="save-btn js-save-item">
                                저장
                            </button>

                            <!-- [D] edit일때만 노출-->
                            <button class="delete-btn js-delete-item">삭제</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="toast-popup" class="toast-popup">메세지</div>
        </section>

        <script src="./dist/js/bundle.min.js"></script>
    </body>
</html>
